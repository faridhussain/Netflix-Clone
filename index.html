<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Epunda+Sans:ital,wght@0,300..900;1,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
    <script
      src="https://kit.fontawesome.com/4d6763e41f.js"
      crossorigin="anonymous"
    ></script>
    <div class="header">
      <nav>
        <img src="assets/logo.png" class="logo" />
        <div>
          <button class="language-btn">
            <i class="fa-solid fa-language"></i> English
            <i class="fa-solid fa-angle-down"></i>
          </button>
          <button class="signin-btn">Sign In</button>
        </div>
      </nav>
      <div class="main-content">
        <h1>Unlimited movies, TV shows and more</h1>
        <h5>Starts at ₹149. Cancel at any time.</h5>
        <p>
          Ready to watch? Enter your email to create or restart your membership.
        </p>
        <div class="system">
          <input type="text" placeholder="Email Address" />
          <button>Get Started <i class="fa-solid fa-arrow-right"></i></button>
        </div>
      </div>
    </div>
  </body>
</html>
